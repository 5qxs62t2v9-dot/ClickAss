<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>ClickAss</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        :root {
            --bg-gradient-light: linear-gradient(145deg, #ffe8ce 0%, #ffce9e 100%);
            --card-light: rgba(250, 240, 225, 0.85);
            --text-light: #2e241a;
            --btn-light: #f39c12;
            --btn-hover-light: #e67e22;
            --glow-light: 0 0 12px rgba(255, 160, 80, 0.8);
        }

        :root {
            --bg-gradient-dark: linear-gradient(135deg, #1a1f2a 0%, #0f1118 100%);
            --card-dark: rgba(25, 30, 38, 0.88);
            --text-dark: #f0e6d2;
            --btn-dark: #c96f1e;
            --btn-hover-dark: #b55d12;
            --glow-dark: 0 0 14px #e67e22;
        }

        body {
            background: var(--bg-gradient-light);
            color: var(--text-light);
            transition: background 0.2s, color 0.2s;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }

        @media (prefers-color-scheme: dark) {
            body { background: var(--bg-gradient-dark); color: var(--text-dark); }
            .card, .modal-content { background: var(--card-dark); backdrop-filter: blur(14px); border: 1px solid rgba(255,180,100,0.2); }
            .shop-btn, .upgrade-btn { background: var(--btn-dark); }
            .shop-btn:hover, .upgrade-btn:hover { background: var(--btn-hover-dark); }
        }
        @media (prefers-color-scheme: light) {
            body { background: var(--bg-gradient-light); color: var(--text-light); }
            .card, .modal-content { background: var(--card-light); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.05); }
            .shop-btn, .upgrade-btn { background: var(--btn-light); }
            .shop-btn:hover, .upgrade-btn:hover { background: var(--btn-hover-light); }
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .card {
            width: 100%;
            max-width: 620px;
            border-radius: 64px;
            padding: 20px 20px 30px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .date-area {
            font-size: 0.9rem;
            background: rgba(0,0,0,0.2);
            display: inline-block;
            width: fit-content;
            margin: 0 auto 5px;
            padding: 5px 18px;
            border-radius: 60px;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .score-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .score-value {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5b042, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .peach {
            font-size: 210px;
            cursor: pointer;
            transition: transform 0.06s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: inline-block;
            margin: 0;
            filter: drop-shadow(0 18px 22px rgba(0,0,0,0.3));
        }
        .peach:active { transform: scale(0.92); }
        .peach-glitter { animation: glitterPulse 0.3s ease-out; }
        @keyframes glitterPulse {
            0% { filter: drop-shadow(0 0 0px gold) brightness(1);}
            50% { filter: drop-shadow(0 0 22px gold) brightness(1.2);}
            100% { filter: drop-shadow(0 0 0px gold) brightness(1);}
        }

        .stats-panel {
            background: rgba(0,0,0,0.2);
            border-radius: 48px;
            padding: 12px 18px;
            margin: 6px 0;
            transition: all 0.2s;
        }
        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 4px 8px;
        }
        .stats-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.15);
            border-radius: 60px;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .hidden-stats .stats-list { display: none; }

        .shop-btn {
            border: none;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 6px;
            width: 85%;
            align-self: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            width: 92%;
            max-width: 540px;
            max-height: 85vh;
            border-radius: 48px;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            border-bottom: 2px solid #ffa559;
        }
        .close-modal {
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            color: inherit;
        }
        .upgrades-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .upgrade-card {
            background: rgba(0,0,0,0.25);
            border-radius: 36px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            transition: box-shadow 0.1s;
        }
        .upgrade-card.pulse-glow {
            box-shadow: 0 0 0 2px gold, 0 0 0 4px #ffaa33;
            transition: 0.08s;
        }
        .upgrade-info { flex: 2; text-align: left; }
        .upgrade-name { font-weight: bold; font-size: 0.95rem; }
        .upgrade-desc { font-size: 0.65rem; opacity: 0.8; }
        .upgrade-cost { font-weight: bold; background: rgba(0,0,0,0.3); border-radius: 30px; padding: 3px 12px; display: inline-block; font-size: 0.75rem; }
        .upgrade-btn {
            border: none;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
        }
        .upgrade-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        footer {
            font-size: 0.7rem;
            opacity: 0.8;
            margin-top: 8px;
        }

        .floating-number {
            position: fixed;
            font-size: 1.9rem;
            font-weight: 800;
            pointer-events: none;
            z-index: 1050;
            text-shadow: 0 0 8px black;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2), opacity 0.5s ease-out;
            opacity: 1;
        }
        .crit-number {
            color: gold;
            text-shadow: 0 0 12px orange, 0 0 6px darkorange;
            font-size: 2.2rem;
            animation: critShake 0.2s ease-out;
        }
        @keyframes critShake {
            0% { transform: scale(0.8) rotate(-5deg); }
            50% { transform: scale(1.3) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        @media (max-width: 520px) {
            .peach { font-size: 150px; }
            .score-value { font-size: 3rem; }
            .stat-row { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="date-area" id="dateDisplay"></div>
        <div class="score-title">🍑 РАСЧЁТ ЭТО САМОГО 💩</div>
        <div class="score-value" id="scoreDisplay">0</div>

        <div id="peach" class="peach" role="button">🍑</div>

        <!-- Панель статистики без лишних подсказок -->
        <div class="stats-panel" id="statsPanel">
            <div class="stats-header" id="toggleStatsBtn">
                <span>📊 СТАТИСТИКА</span>
                <span id="toggleIcon">▲</span>
            </div>
            <div class="stats-list" id="statsList">
                <div class="stat-row"><span>💪 ПОТУЖНОСТЬ</span><span id="statClickPower">1</span></div>
                <div class="stat-row"><span>⚙️ АВТО-ПУКОСТЬ</span><span id="statAuto">0</span></div>
                <div class="stat-row"><span>💥 РАЗРЫВНОСТЬ</span><span id="statCrit">0%</span></div>
                <div class="stat-row"><span>🌀 ПОТУГА ПЛЮС</span><span id="statMultiplier">x1</span></div>
                <div class="stat-row"><span>🍀 ХЕППИ ПЕЙПЕР</span><span id="statLucky">0</span></div>
                <div class="stat-row"><span>💨 НЕОЖИДАННОСТЬ</span><span id="statSurprise">x1</span></div>
                <div class="stat-row"><span>💪 СИЛА СКУФА</span><span id="statHeavy">0</span></div>
                <div class="stat-row"><span>🍔 ЖИРНЫЙ БУРГЕР</span><span id="statBurger">x1.0</span></div>
                <div class="stat-row"><span>🌽 КУКУРУЗНЫЙ ПОЧАТОК</span><span id="statCorn">+0</span></div>
            </div>
        </div>

        <button class="shop-btn" id="openShopBtn">🚽 ТУАЛЕТ НА ПАРКОВКЕ 🧻</button>
        <footer>🍑 больше пальцев = больше свободы</footer>
    </div>
</div>

<div id="shopModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>🚽 ТУАЛЕТ НА ПАРКОВКЕ</h2>
            <button class="close-modal" id="closeShopBtn">&times;</button>
        </div>
        <div class="upgrades-grid" id="upgradesList"></div>
        <div style="margin-top: 14px; text-align: center; font-size: 0.7rem;">💩 потужность выше — счастье ниже 💩</div>
    </div>
</div>

<script>
    // ---------- ИГРОВЫЕ ДАННЫЕ ----------
    let score = 0;
    let clickLevel = 0;          // потужность (база +1 за уровень)
    let autoCount = 0;           // авто-пукость
    let doublerLevel = 0;        // потуга плюс: множитель = 1 + doublerLevel (1->x2, 2->x3...)
    let critLevel = 0;           // разрывность (базовый шанс 15% + 5% за уровень)
    let luckyLevel = 0;          // хеппи пейпер (добавляет +10% крита)
    let surpriseLevel = 0;       // неожиданность: бонус = авто-пукость * (1 + surpriseLevel) каждые 10 сек
    let heavyLevel = 0;          // сила скуфа: +2 за уровень к базе
    let burgerLevel = 0;         // жирный бургер: множитель всех доходов = 1 + burgerLevel * 0.1
    let cornLevel = 0;           // кукурузный початок: дополнительный доход при клике = авто-пукость * 0.2 * cornLevel
    let cosmeticPurchased = false;

    // Динамические цены
    function getClickUpgradeCost() { return 10 + clickLevel * 5; }
    function getAutoUpgradeCost() { return 40 + autoCount * 15; }
    function getDoublerCost() { return Math.floor(180 * Math.pow(1.55, doublerLevel)); }
    function getCritCost() { return 100 + critLevel * 50; }
    function getLuckyCost() { return Math.floor(130 * Math.pow(1.6, luckyLevel)); }
    function getSurpriseCost() { return Math.floor(190 * Math.pow(1.65, surpriseLevel)); }
    function getHeavyCost() { return 140 + heavyLevel * 70; }
    function getBurgerCost() { return Math.floor(280 * Math.pow(1.5, burgerLevel)); }
    function getCornCost() { return Math.floor(150 * Math.pow(1.4, cornLevel)); }
    function getCosmeticCost() { return 30; }

    function getBaseClick() { return 1 + clickLevel + (heavyLevel * 2); }
    function getMultiplier() { return 1 + doublerLevel; }
    function getCritChance() { return Math.min(0.8, 0.15 + (critLevel * 0.05) + (luckyLevel * 0.1)); }
    function getGlobalMultiplier() { return 1 + burgerLevel * 0.1; }
    function getCornBonus() { return Math.floor(autoCount * 0.2 * cornLevel); }

    function getFinalClickValue() {
        let base = getBaseClick();
        let multiplier = getMultiplier();
        let global = getGlobalMultiplier();
        let raw = base * multiplier * global;
        let isCrit = Math.random() < getCritChance();
        let final = isCrit ? raw * 3 : raw;
        final += getCornBonus();
        return { value: Math.floor(final), isCrit };
    }

    function saveGame() {
        const data = { score, clickLevel, autoCount, doublerLevel, critLevel, luckyLevel, surpriseLevel, heavyLevel, burgerLevel, cornLevel, cosmeticPurchased };
        localStorage.setItem('ClickAssSave', JSON.stringify(data));
    }
    function loadGame() {
        const raw = localStorage.getItem('ClickAssSave');
        if(!raw) return;
        try {
            const d = JSON.parse(raw);
            score = d.score ?? 0;
            clickLevel = d.clickLevel ?? 0;
            autoCount = d.autoCount ?? 0;
            doublerLevel = d.doublerLevel ?? 0;
            critLevel = d.critLevel ?? 0;
            luckyLevel = d.luckyLevel ?? 0;
            surpriseLevel = d.surpriseLevel ?? 0;
            heavyLevel = d.heavyLevel ?? 0;
            burgerLevel = d.burgerLevel ?? 0;
            cornLevel = d.cornLevel ?? 0;
            cosmeticPurchased = d.cosmeticPurchased ?? false;
            if(cosmeticPurchased) applyCosmetic();
        } catch(e) {}
    }

    function glowUpgrade(elementId) {
        const el = document.getElementById(elementId);
        if(el) { el.classList.add('pulse-glow'); setTimeout(() => el.classList.remove('pulse-glow'), 300); }
    }

    function showFloatingNumber(value, isCrit, x, y) {
        const div = document.createElement('div');
        div.innerText = `${value}`;
        div.className = 'floating-number';
        if(isCrit) div.classList.add('crit-number');
        div.style.left = `${x}px`;
        div.style.top = `${y - 25}px`;
        document.body.appendChild(div);
        requestAnimationFrame(() => {
            div.style.transform = `translateY(-70px) translateX(${Math.random() * 30 - 15}px)`;
            div.style.opacity = '0';
        });
        setTimeout(() => div.remove(), 500);
    }

    function updateUI() {
        document.getElementById('scoreDisplay').innerText = Math.floor(score);
        document.getElementById('statClickPower').innerText = getBaseClick() * getMultiplier() * getGlobalMultiplier();
        document.getElementById('statAuto').innerText = autoCount;
        document.getElementById('statCrit').innerText = Math.floor(getCritChance()*100)+'%';
        document.getElementById('statMultiplier').innerText = `x${getMultiplier()}`;
        document.getElementById('statLucky').innerText = luckyLevel;
        document.getElementById('statSurprise').innerText = `x${1+surpriseLevel}`;
        document.getElementById('statHeavy').innerText = heavyLevel*2;
        document.getElementById('statBurger').innerText = `x${(1+burgerLevel*0.1).toFixed(1)}`;
        document.getElementById('statCorn').innerText = `+${getCornBonus()}`;
        updateShopPanel();
        saveGame();
    }

    function updateShopPanel() {
        const container = document.getElementById('upgradesList');
        if(!container) return;
        const clickCost = getClickUpgradeCost();
        const autoCost = getAutoUpgradeCost();
        const doublerCost = getDoublerCost();
        const critCost = getCritCost();
        const luckyCost = getLuckyCost();
        const surpriseCost = getSurpriseCost();
        const heavyCost = getHeavyCost();
        const burgerCost = getBurgerCost();
        const cornCost = getCornCost();
        const cosmeticCost = getCosmeticCost();

        const canClick = score >= clickCost;
        const canAuto = score >= autoCost;
        const canDoubler = score >= doublerCost;
        const canCrit = score >= critCost;
        const canLucky = score >= luckyCost;
        const canSurprise = score >= surpriseCost;
        const canHeavy = score >= heavyCost;
        const canBurger = score >= burgerCost;
        const canCorn = score >= cornCost;
        const canCosmetic = !cosmeticPurchased && score >= cosmeticCost;

        container.innerHTML = `
            <div class="upgrade-card" id="cardClick"><div class="upgrade-info"><div class="upgrade-name">💪 ПОТУЖНОСТЬ +1</div><div class="upgrade-desc">уровень ${clickLevel}</div><div class="upgrade-cost">💰 ${clickCost} 💩</div></div><button class="upgrade-btn" id="buyClickBtn" ${!canClick ? 'disabled' : ''}>Купить</button></div>
            <div class="upgrade-card" id="cardAuto"><div class="upgrade-info"><div class="upgrade-name">⚙️ АВТО-ПУКОСТЬ +1/сек</div><div class="upgrade-desc">всего: ${autoCount}</div><div class="upgrade-cost">💰 ${autoCost} 💩</div></div><button class="upgrade-btn" id="buyAutoBtn" ${!canAuto ? 'disabled' : ''}>Купить</button></div>
            <div class="upgrade-card" id="cardDoubler"><div class="upgrade-info"><div class="upgrade-name">🌀 ПОТУГА ПЛЮС (x${1+doublerLevel} → x${2+doublerLevel})</div><div class="upgrade-desc">множитель потужности</div><div class="upgrade-cost">💰 ${doublerCost} 💩</div></div><button class="upgrade-btn" id="buyDoublerBtn" ${!canDoubler ? 'disabled' : ''}>Купить</button></div>
            <div class="upgrade-card" id="cardCrit"><div class="upgrade-info"><div class="upgrade-name">💥 РАЗРЫВНОСТЬ +5% крита</div><div class="upgrade-desc">шанс ${Math.floor(getCritChance()*100)}%</div><div class="upgrade-cost">💰 ${critCost} 💩</div></div><button class="upgrade-btn" id="buyCritBtn" ${!canCrit ? 'disabled' : ''}>Купить</button></div>
            <div class="upgrade-card" id="cardLucky"><div class="upgrade-info"><div class="upgrade-name">🍀 ХЕППИ ПЕЙПЕР (+10% крита)</div><div class="upgrade-desc">уровень ${luckyLevel}</div><div class="upgrade-cost">💰 ${luckyCost} 💩</div></div><button class="upgrade-btn" id="buyLuckyBtn" ${!canLucky ? 'disabled' : ''}>Купить</button></div>
            <div class="upgrade-card" id="cardSurprise"><div class="upgrade-info"><div class="upgrade-name">💨 НЕОЖИДАННОСТЬ (x бонус)</div><div class="upgrade-desc">каждые 10 сек ×${1+surpriseLevel} → ×${2+surpriseLevel}</div><div class="upgrade-cost">💰 ${surpriseCost} 💩</div></div><button class="upgrade-btn" id="buySurpriseBtn" ${!canSurprise ? 'disabled' : ''}>Купить</button></div>
            <div class="upgrade-card" id="cardHeavy"><div class="upgrade-info"><div class="upgrade-name">💪 СИЛА СКУФА (+2 к базе)</div><div class="upgrade-desc">уровень ${heavyLevel} → +${heavyLevel*2}</div><div class="upgrade-cost">💰 ${heavyCost} 💩</div></div><button class="upgrade-btn" id="buyHeavyBtn" ${!canHeavy ? 'disabled' : ''}>Купить</button></div>
            <div class="upgrade-card" id="cardBurger"><div class="upgrade-info"><div class="upgrade-name">🍔 ЖИРНЫЙ БУРГЕР (x1.1 дохода)</div><div class="upgrade-desc">множитель: x${(1+burgerLevel*0.1).toFixed(1)} → x${(1+(burgerLevel+1)*0.1).toFixed(1)}</div><div class="upgrade-cost">💰 ${burgerCost} 💩</div></div><button class="upgrade-btn" id="buyBurgerBtn" ${!canBurger ? 'disabled' : ''}>Купить</button></div>
            <div class="upgrade-card" id="cardCorn"><div class="upgrade-info"><div class="upgrade-name">🌽 КУКУРУЗНЫЙ ПОЧАТОК</div><div class="upgrade-desc">+${Math.floor(autoCount*0.2*(cornLevel+1))} при клике</div><div class="upgrade-cost">💰 ${cornCost} 💩</div></div><button class="upgrade-btn" id="buyCornBtn" ${!canCorn ? 'disabled' : ''}>Купить</button></div>
            <div class="upgrade-card" id="cardCosmetic"><div class="upgrade-info"><div class="upgrade-name">✨ БЛЕСТЯЩИЙ ПЕРСИК</div><div class="upgrade-desc">визуальный эффект</div><div class="upgrade-cost">💰 ${cosmeticCost} 💩</div></div><button class="upgrade-btn" id="buyCosmeticBtn" ${cosmeticPurchased ? 'disabled' : ''} ${!canCosmetic ? 'disabled' : ''}>${cosmeticPurchased ? 'Сияет 🌟' : 'Купить'}</button></div>
        `;
        document.getElementById('buyClickBtn')?.addEventListener('click', () => { if(buyClick()) glowUpgrade('cardClick'); });
        document.getElementById('buyAutoBtn')?.addEventListener('click', () => { if(buyAuto()) glowUpgrade('cardAuto'); });
        document.getElementById('buyDoublerBtn')?.addEventListener('click', () => { if(buyDoubler()) glowUpgrade('cardDoubler'); });
        document.getElementById('buyCritBtn')?.addEventListener('click', () => { if(buyCrit()) glowUpgrade('cardCrit'); });
        document.getElementById('buyLuckyBtn')?.addEventListener('click', () => { if(buyLucky()) glowUpgrade('cardLucky'); });
        document.getElementById('buySurpriseBtn')?.addEventListener('click', () => { if(buySurprise()) glowUpgrade('cardSurprise'); });
        document.getElementById('buyHeavyBtn')?.addEventListener('click', () => { if(buyHeavy()) glowUpgrade('cardHeavy'); });
        document.getElementById('buyBurgerBtn')?.addEventListener('click', () => { if(buyBurger()) glowUpgrade('cardBurger'); });
        document.getElementById('buyCornBtn')?.addEventListener('click', () => { if(buyCorn()) glowUpgrade('cardCorn'); });
        document.getElementById('buyCosmeticBtn')?.addEventListener('click', () => { if(buyCosmetic()) glowUpgrade('cardCosmetic'); });
    }

    function buyClick() { let c = getClickUpgradeCost(); if(score>=c) { score-=c; clickLevel++; updateUI(); return true; } return false; }
    function buyAuto() { let c = getAutoUpgradeCost(); if(score>=c) { score-=c; autoCount++; updateUI(); return true; } return false; }
    function buyDoubler() { let c = getDoublerCost(); if(score>=c) { score-=c; doublerLevel++; updateUI(); return true; } return false; }
    function buyCrit() { let c = getCritCost(); if(score>=c) { score-=c; critLevel++; updateUI(); return true; } return false; }
    function buyLucky() { let c = getLuckyCost(); if(score>=c) { score-=c; luckyLevel++; updateUI(); return true; } return false; }
    function buySurprise() { let c = getSurpriseCost(); if(score>=c) { score-=c; surpriseLevel++; updateUI(); startSurpriseInterval(); return true; } return false; }
    function buyHeavy() { let c = getHeavyCost(); if(score>=c) { score-=c; heavyLevel++; updateUI(); return true; } return false; }
    function buyBurger() { let c = getBurgerCost(); if(score>=c) { score-=c; burgerLevel++; updateUI(); return true; } return false; }
    function buyCorn() { let c = getCornCost(); if(score>=c) { score-=c; cornLevel++; updateUI(); return true; } return false; }
    function buyCosmetic() { if(!cosmeticPurchased && score>=30) { score-=30; cosmeticPurchased=true; applyCosmetic(); updateUI(); return true; } return false; }
    function applyCosmetic() { peachDiv.style.filter = "drop-shadow(0 0 20px gold) brightness(1.1)"; }

    let surpriseInterval = null;
    function startSurpriseInterval() {
        if(surpriseInterval) clearInterval(surpriseInterval);
        surpriseInterval = setInterval(() => {
            if(surpriseLevel >= 0 && autoCount > 0) {
                let bonus = autoCount * (1 + surpriseLevel);
                score += bonus;
                updateUI();
            }
        }, 10000);
    }

    function handleTap(touchCount, centerX, centerY) {
        for(let i=0; i<touchCount; i++) {
            let { value, isCrit } = getFinalClickValue();
            if(value<=0) continue;
            score += value;
            let offsetX = (i%3-1)*12;
            let offsetY = Math.floor(i/3)*15 - 8;
            showFloatingNumber(value, isCrit, centerX+offsetX, centerY+offsetY);
            if(isCrit && cosmeticPurchased) {
                peachDiv.classList.add('peach-glitter');
                setTimeout(() => peachDiv.classList.remove('peach-glitter'), 200);
            }
        }
        updateUI();
        peachDiv.style.transform = 'scale(0.92)';
        setTimeout(() => peachDiv.style.transform = '', 100);
    }

    function onTouch(e) {
        e.preventDefault();
        const touches = e.touches;
        if(touches.length === 0) return;
        let sumX=0, sumY=0;
        for(let i=0;i<touches.length;i++) { sumX+=touches[i].clientX; sumY+=touches[i].clientY; }
        handleTap(touches.length, sumX/touches.length, sumY/touches.length);
    }
    function onMouseClick(e) {
        const rect = peachDiv.getBoundingClientRect();
        handleTap(1, rect.left+rect.width/2, rect.top+rect.height/2);
    }

    let statsVisible = true;
    function toggleStats() {
        statsVisible = !statsVisible;
        const list = document.getElementById('statsList');
        const icon = document.getElementById('toggleIcon');
        if(statsVisible) { list.style.display = 'flex'; icon.innerHTML = '▲'; }
        else { list.style.display = 'none'; icon.innerHTML = '▼'; }
    }

    let autoInterval = null;
    function startAutoIncome() {
        if(autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(() => {
            if(autoCount > 0) { score += autoCount; updateUI(); }
        }, 1000);
    }

    function updateDate() {
        const now = new Date();
        const day = now.getDate();
        const month = ["January","February","March","April","May","June","July","August","September","October","November","December"][now.getMonth()];
        document.getElementById('dateDisplay').innerHTML = `The ${day}<sup>67</sup>st of ${month}`;
    }

    function openShop() { updateShopPanel(); shopModal.style.display = 'flex'; }
    function closeShop() { shopModal.style.display = 'none'; }

    function init() {
        loadGame();
        updateDate();
        setInterval(updateDate, 60000);
        updateUI();
        startAutoIncome();
        startSurpriseInterval();
        peachDiv.addEventListener('touchstart', onTouch, { passive: false });
        peachDiv.addEventListener('mousedown', onMouseClick);
        peachDiv.addEventListener('contextmenu', (e) => e.preventDefault());
        document.getElementById('openShopBtn').addEventListener('click', openShop);
        document.getElementById('closeShopBtn').addEventListener('click', closeShop);
        window.addEventListener('click', (e) => { if(e.target === shopModal) closeShop(); });
        document.getElementById('toggleStatsBtn').addEventListener('click', toggleStats);
        if(cosmeticPurchased) applyCosmetic();
    }
    init();
</script>
</body>
</html>
