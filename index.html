<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ClickAss — Персиковый кликер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Адаптивная тема (светлая/тёмная) */
        :root {
            --bg-gradient-light: linear-gradient(135deg, #fff9e8 0%, #ffe6c7 100%);
            --card-light: rgba(255, 245, 225, 0.9);
            --text-light: #3a2c1f;
            --accent-light: #ffa559;
            --peach-shadow-light: 0 20px 35px rgba(0, 0, 0, 0.1), 0 0 0 5px rgba(255, 165, 89, 0.3);
            --btn-light: #ffb347;
            --btn-hover-light: #ff9f1a;
        }

        :root {
            --bg-gradient-dark: linear-gradient(135deg, #1e2a2a 0%, #0f1a1f 100%);
            --card-dark: rgba(30, 35, 40, 0.9);
            --text-dark: #f0e6d2;
            --accent-dark: #e67e22;
            --peach-shadow-dark: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 5px rgba(230, 126, 34, 0.4);
            --btn-dark: #c96f1e;
            --btn-hover-dark: #b55d12;
        }

        /* по умолчанию светлая тема (будет переопределена медиа-запросом) */
        body {
            background: var(--bg-gradient-light);
            color: var(--text-light);
            transition: background 0.2s ease, color 0.2s;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* тёмная тема через prefers-color-scheme */
        @media (prefers-color-scheme: dark) {
            body {
                background: var(--bg-gradient-dark);
                color: var(--text-dark);
            }
            .card, .modal-content {
                background: var(--card-dark);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 215, 150, 0.2);
            }
            .peach {
                box-shadow: var(--peach-shadow-dark);
            }
            .shop-btn, .upgrade-btn {
                background: var(--btn-dark);
            }
            .shop-btn:hover, .upgrade-btn:hover {
                background: var(--btn-hover-dark);
            }
        }

        /* светлая тема (если система светлая) */
        @media (prefers-color-scheme: light) {
            body {
                background: var(--bg-gradient-light);
                color: var(--text-light);
            }
            .card, .modal-content {
                background: var(--card-light);
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 200, 120, 0.6);
            }
            .peach {
                box-shadow: var(--peach-shadow-light);
            }
            .shop-btn, .upgrade-btn {
                background: var(--btn-light);
            }
            .shop-btn:hover, .upgrade-btn:hover {
                background: var(--btn-hover-light);
            }
        }

        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        .card {
            border-radius: 64px 64px 48px 48px;
            padding: 25px 20px 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
        }

        .score-area {
            margin-bottom: 20px;
        }

        .score-title {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .score-value {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5b042, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
            letter-spacing: 2px;
        }

        .peach {
            font-size: 180px;
            cursor: pointer;
            transition: transform 0.08s linear, filter 0.1s;
            display: inline-block;
            margin: 15px 0;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }
        .peach:active {
            transform: scale(0.92);
        }
        .peach-glitter {
            animation: glitterPulse 0.4s ease-out;
        }
        @keyframes glitterPulse {
            0% { text-shadow: 0 0 0px gold, 0 0 0px orange; filter: brightness(1);}
            50% { text-shadow: 0 0 20px gold, 0 0 30px #ffaa33; filter: brightness(1.2);}
            100% { text-shadow: 0 0 0px gold; filter: brightness(1);}
        }

        .stats {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.1);
            border-radius: 60px;
            padding: 12px 18px;
            margin: 15px 0;
            font-weight: bold;
            font-size: 1rem;
            backdrop-filter: blur(4px);
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .stat-label {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .stat-number {
            font-size: 1.35rem;
            font-weight: 800;
        }

        .shop-btn {
            border: none;
            padding: 14px 28px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            margin-top: 10px;
            width: 80%;
        }

        /* модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 48px;
            padding: 20px 18px 30px;
            overflow-y: auto;
            position: relative;
            animation: fadeSlide 0.2s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,165,80,0.5);
        }
        .modal-header h2 {
            font-size: 1.8rem;
        }
        .close-modal {
            font-size: 2rem;
            cursor: pointer;
            font-weight: bold;
            background: none;
            border: none;
            color: inherit;
        }
        .upgrades-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .upgrade-card {
            background: rgba(0,0,0,0.2);
            border-radius: 40px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .upgrade-info {
            flex: 2;
            text-align: left;
        }
        .upgrade-name {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .upgrade-desc {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .upgrade-cost {
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 4px 12px;
            display: inline-block;
        }
        .upgrade-btn {
            border: none;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: 0.1s;
            font-size: 1rem;
        }
        .upgrade-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .badge {
            font-size: 0.7rem;
            background: gold;
            color: #2c1a0a;
            border-radius: 20px;
            padding: 2px 10px;
            margin-left: 8px;
        }
        footer {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.6;
        }
        @media (max-width: 480px) {
            .peach { font-size: 140px; }
            .score-value { font-size: 2.6rem; }
            .stats { flex-direction: column; gap: 8px; align-items: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="score-area">
            <div class="score-title">
                <span>🍑 КАКАШКИ 💩</span>
            </div>
            <div class="score-value" id="scoreDisplay">0</div>
        </div>

        <div id="peach" class="peach" role="button" aria-label="Кликни по персику">🍑</div>

        <div class="stats">
            <div class="stat-item"><span class="stat-label">💪 Сила клика</span><span class="stat-number" id="clickPowerStat">1</span></div>
            <div class="stat-item"><span class="stat-label">⚙️ Авто-каки/сек</span><span class="stat-number" id="autoStat">0</span></div>
            <div class="stat-item"><span class="stat-label">✨ Крит (x3)</span><span class="stat-number" id="critStat">❌</span></div>
            <div class="stat-item"><span class="stat-label">🌀 Удвоитель</span><span class="stat-number" id="doubleStat">❌</span></div>
        </div>

        <button class="shop-btn" id="openShopBtn">🛒 МАГАЗИН 🛍️</button>
        <footer>Тапай на персик ➕ зарабатывай 💩</footer>
    </div>
</div>

<!-- Модальное окно магазина -->
<div id="shopModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>🍑 Магазин улучшений</h2>
            <button class="close-modal" id="closeShopBtn">&times;</button>
        </div>
        <div class="upgrades-grid" id="upgradesList">
            <!-- динамическое содержимое через JS, но для структуры зададим элементы с id -->
        </div>
        <div style="margin-top: 12px; text-align: center; font-size: 0.8rem;">✨ Улучшения навсегда ✨</div>
    </div>
</div>

<script>
    // --- ИГРОВЫЕ ПЕРЕМЕННЫЕ ---
    let score = 0;                // какашки
    let clickLevel = 0;          // количество купленных улучшений клика (+1 к базе)
    let autoCount = 0;           // количество автокликеров (1 какашка/сек каждый)
    let doublerPurchased = false; // удвоитель силы клика
    let critPurchased = false;    // крит шанс 15% x3 урон
    let cosmeticPurchased = false;// блестящий персик (визуал)

    // цены и базовые формулы
    function getClickUpgradeCost() {
        return 10 + clickLevel * 5;
    }
    function getAutoUpgradeCost() {
        return 40 + autoCount * 15;
    }
    const DOUBLER_COST = 200;
    const CRIT_COST = 90;
    const COSMETIC_COST = 25;

    // DOM элементы
    const scoreDisplay = document.getElementById('scoreDisplay');
    const peachDiv = document.getElementById('peach');
    const clickPowerStat = document.getElementById('clickPowerStat');
    const autoStat = document.getElementById('autoStat');
    const critStatSpan = document.getElementById('critStat');
    const doubleStatSpan = document.getElementById('doubleStat');
    const openShopBtn = document.getElementById('openShopBtn');
    const shopModal = document.getElementById('shopModal');
    const closeShopBtn = document.getElementById('closeShopBtn');
    const upgradesContainer = document.getElementById('upgradesList');

    // Вспомогательные функции
    function getBaseClickValue() {
        let base = 1 + clickLevel;
        if (doublerPurchased) base *= 2;
        return Math.floor(base);
    }

    function getFinalClickValueWithCrit() {
        let val = getBaseClickValue();
        if (critPurchased && Math.random() < 0.15) {
            val *= 3;
            return { value: val, isCrit: true };
        }
        return { value: val, isCrit: false };
    }

    // Сохранение в localStorage
    function saveGame() {
        const saveData = {
            score: score,
            clickLevel: clickLevel,
            autoCount: autoCount,
            doublerPurchased: doublerPurchased,
            critPurchased: critPurchased,
            cosmeticPurchased: cosmeticPurchased
        };
        localStorage.setItem('ClickAssSave', JSON.stringify(saveData));
    }

    // Загрузка
    function loadGame() {
        const raw = localStorage.getItem('ClickAssSave');
        if (!raw) return;
        try {
            const data = JSON.parse(raw);
            score = data.score ?? 0;
            clickLevel = data.clickLevel ?? 0;
            autoCount = data.autoCount ?? 0;
            doublerPurchased = data.doublerPurchased ?? false;
            critPurchased = data.critPurchased ?? false;
            cosmeticPurchased = data.cosmeticPurchased ?? false;
            if (cosmeticPurchased) applyCosmeticEffect();
        } catch(e) { console.warn(e); }
    }

    // Обновить весь UI (счёт, статы, магазин, кнопки)
    function updateUI() {
        scoreDisplay.innerText = Math.floor(score);
        clickPowerStat.innerText = getBaseClickValue();
        autoStat.innerText = autoCount;
        critStatSpan.innerText = critPurchased ? '✔️ 15%' : '❌';
        doubleStatSpan.innerText = doublerPurchased ? '✔️ x2' : '❌';
        updateShopPanel();
        saveGame();
    }

    // рендер магазина (динамическое обновление кнопок)
    function updateShopPanel() {
        if (!upgradesContainer) return;
        const clickCost = getClickUpgradeCost();
        const autoCost = getAutoUpgradeCost();
        const canAffordClick = score >= clickCost;
        const canAffordAuto = score >= autoCost;
        const canAffordDoubler = (!doublerPurchased && score >= DOUBLER_COST);
        const canAffordCrit = (!critPurchased && score >= CRIT_COST);
        const canAffordCosmetic = (!cosmeticPurchased && score >= COSMETIC_COST);

        upgradesContainer.innerHTML = `
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <div class="upgrade-name">💪 Усиление клика +1</div>
                    <div class="upgrade-desc">Увеличивает силу нажатия на +1 💩 (текущий уровень: ${clickLevel})</div>
                    <div class="upgrade-cost">💰 ${clickCost} 💩</div>
                </div>
                <button class="upgrade-btn" id="buyClickUpgradeBtn" ${!canAffordClick ? 'disabled' : ''}>Купить</button>
            </div>
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <div class="upgrade-name">⚙️ Автокакашник 🤖</div>
                    <div class="upgrade-desc">Приносит 1 💩 каждую секунду (всего: ${autoCount} авто/сек)</div>
                    <div class="upgrade-cost">💰 ${autoCost} 💩</div>
                </div>
                <button class="upgrade-btn" id="buyAutoUpgradeBtn" ${!canAffordAuto ? 'disabled' : ''}>Купить</button>
            </div>
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <div class="upgrade-name">🌀 Удвоитель мощи</div>
                    <div class="upgrade-desc">Навсегда УДВАИВАЕТ силу клика!</div>
                    <div class="upgrade-cost">💰 ${DOUBLER_COST} 💩</div>
                </div>
                <button class="upgrade-btn" id="buyDoublerBtn" ${doublerPurchased ? 'disabled' : ''} ${!canAffordDoubler && !doublerPurchased ? 'disabled' : ''}>${doublerPurchased ? 'Куплено ✅' : 'Купить'}</button>
            </div>
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <div class="upgrade-name">✨ Критический персик</div>
                    <div class="upgrade-desc">15% шанс нанести ТРОЙНОЙ урон!</div>
                    <div class="upgrade-cost">💰 ${CRIT_COST} 💩</div>
                </div>
                <button class="upgrade-btn" id="buyCritBtn" ${critPurchased ? 'disabled' : ''} ${!canAffordCrit && !critPurchased ? 'disabled' : ''}>${critPurchased ? 'Активирован 🔥' : 'Купить'}</button>
            </div>
            <div class="upgrade-card">
                <div class="upgrade-info">
                    <div class="upgrade-name">✨ Блестящий персик ✨</div>
                    <div class="upgrade-desc">Прикольная визуальная фишка + блеск при клике</div>
                    <div class="upgrade-cost">💰 ${COSMETIC_COST} 💩</div>
                </div>
                <button class="upgrade-btn" id="buyCosmeticBtn" ${cosmeticPurchased ? 'disabled' : ''} ${!canAffordCosmetic && !cosmeticPurchased ? 'disabled' : ''}>${cosmeticPurchased ? 'Сияет! 🌟' : 'Приобрести'}</button>
            </div>
        `;

        // вешаем события на кнопки магазина
        document.getElementById('buyClickUpgradeBtn')?.addEventListener('click', () => buyClickUpgrade());
        document.getElementById('buyAutoUpgradeBtn')?.addEventListener('click', () => buyAutoClicker());
        document.getElementById('buyDoublerBtn')?.addEventListener('click', () => buyDoubler());
        document.getElementById('buyCritBtn')?.addEventListener('click', () => buyCrit());
        document.getElementById('buyCosmeticBtn')?.addEventListener('click', () => buyCosmetic());
    }

    // Функции покупок
    function buyClickUpgrade() {
        let cost = getClickUpgradeCost();
        if (score >= cost) {
            score -= cost;
            clickLevel++;
            updateUI();
            showFloatingMessage(`+1 к силе! 💪`, '#f4a261');
        } else {
            showFloatingMessage(`Не хватает 💩!`, '#e67e22');
        }
    }

    function buyAutoClicker() {
        let cost = getAutoUpgradeCost();
        if (score >= cost) {
            score -= cost;
            autoCount++;
            updateUI();
            showFloatingMessage(`Авто-какашник +1/сек! 🤖`, '#76c893');
        } else {
            showFloatingMessage(`Не хватает какашек!`, '#e67e22');
        }
    }

    function buyDoubler() {
        if (doublerPurchased) return;
        if (score >= DOUBLER_COST) {
            score -= DOUBLER_COST;
            doublerPurchased = true;
            updateUI();
            showFloatingMessage(`УДВОИТЕЛЬ АКТИВИРОВАН! 🌀`, '#f4d03f');
        } else {
            showFloatingMessage(`Нужно ${DOUBLER_COST} 💩!`, '#e67e22');
        }
    }

    function buyCrit() {
        if (critPurchased) return;
        if (score >= CRIT_COST) {
            score -= CRIT_COST;
            critPurchased = true;
            updateUI();
            showFloatingMessage(`КРИТИЧЕСКИЙ УДАР РАЗБЛОКИРОВАН! ⚡ x3`, '#e9c46a');
        } else {
            showFloatingMessage(`Недостаточно какашек!`, '#e67e22');
        }
    }

    function buyCosmetic() {
        if (cosmeticPurchased) return;
        if (score >= COSMETIC_COST) {
            score -= COSMETIC_COST;
            cosmeticPurchased = true;
            applyCosmeticEffect();
            updateUI();
            showFloatingMessage(`Персик засиял! ✨🌟`, '#ffb347');
        } else {
            showFloatingMessage(`Нужно ${COSMETIC_COST} 💩`, '#e67e22');
        }
    }

    function applyCosmeticEffect() {
        peachDiv.style.filter = "drop-shadow(0 0 12px gold) brightness(1.05)";
        peachDiv.style.transition = "0.2s";
    }

    // всплывающие сообщения (фан)
    function showFloatingMessage(text, color = '#ffb347') {
        let floatMsg = document.createElement('div');
        floatMsg.innerText = text;
        floatMsg.style.position = 'fixed';
        floatMsg.style.bottom = '30%';
        floatMsg.style.left = '50%';
        floatMsg.style.transform = 'translateX(-50%)';
        floatMsg.style.backgroundColor = color;
        floatMsg.style.color = '#1f1a12';
        floatMsg.style.padding = '8px 20px';
        floatMsg.style.borderRadius = '40px';
        floatMsg.style.fontWeight = 'bold';
        floatMsg.style.zIndex = '9999';
        floatMsg.style.fontSize = '1.1rem';
        floatMsg.style.boxShadow = '0 5px 15px black';
        floatMsg.style.pointerEvents = 'none';
        floatMsg.style.whiteSpace = 'nowrap';
        document.body.appendChild(floatMsg);
        setTimeout(() => {
            floatMsg.style.opacity = '0';
            setTimeout(() => floatMsg.remove(), 500);
        }, 1000);
    }

    // Эффект "+число" при клике
    function showClickEffect(x, y, amount, isCrit = false) {
        const el = document.createElement('div');
        el.innerText = isCrit ? `💥 +${amount} КРИТ!` : `➕ +${amount}`;
        el.style.position = 'fixed';
        el.style.left = `${x}px`;
        el.style.top = `${y - 30}px`;
        el.style.fontSize = '1.7rem';
        el.style.fontWeight = 'bold';
        el.style.color = isCrit ? '#ffd966' : '#ffaa44';
        el.style.textShadow = '0 0 5px black';
        el.style.zIndex = '9999';
        el.style.pointerEvents = 'none';
        el.style.transition = 'all 0.5s ease-out';
        el.style.opacity = '1';
        document.body.appendChild(el);
        requestAnimationFrame(() => {
            el.style.transform = 'translateY(-50px)';
            el.style.opacity = '0';
        });
        setTimeout(() => el.remove(), 500);
    }

    // клик по персику
    function onPeachClick(event) {
        const { value: clickGain, isCrit } = getFinalClickValueWithCrit();
        if (clickGain <= 0) return;
        score += clickGain;
        updateUI();

        // анимация
        peachDiv.style.transform = 'scale(0.92)';
        setTimeout(() => { peachDiv.style.transform = ''; }, 100);

        // визуальный эффект блеска, если куплен косметик
        if (cosmeticPurchased) {
            peachDiv.classList.add('peach-glitter');
            setTimeout(() => peachDiv.classList.remove('peach-glitter'), 300);
        }

        // получить координаты для всплывающего числа
        let rect = peachDiv.getBoundingClientRect();
        let clickX = rect.left + rect.width / 2;
        let clickY = rect.top + rect.height / 2;
        showClickEffect(clickX, clickY, clickGain, isCrit);
        if (isCrit) {
            showFloatingMessage('🍑 КРИТИЧЕСКИЙ ПЕРСИК! x3 🍑', '#f39c12');
        }
        saveGame();
    }

    // Автодобыча (каждую секунду)
    let passiveInterval = null;
    function startPassiveIncome() {
        if (passiveInterval) clearInterval(passiveInterval);
        passiveInterval = setInterval(() => {
            if (autoCount > 0) {
                let passiveIncome = autoCount;
                score += passiveIncome;
                updateUI();
                // не спамим уведомлениями каждую секунду, но можно маленькое всплытие редко?
                // для атмосферы: раз в 2 секунды можно сообщение, но не будем засорять.
                if (Math.random() < 0.2) {
                    showFloatingMessage(`+${passiveIncome} авто-какашек 💩`, '#aa8c5e');
                }
            }
        }, 1000);
    }

    // Модалка
    function openShop() {
        updateShopPanel();   // перерисовать актуальные цены
        shopModal.style.display = 'flex';
    }
    function closeShop() {
        shopModal.style.display = 'none';
    }

    // Инициализация
    function init() {
        loadGame();
        if (cosmeticPurchased) applyCosmeticEffect();
        updateUI();
        startPassiveIncome();
        peachDiv.addEventListener('click', onPeachClick);
        openShopBtn.addEventListener('click', openShop);
        closeShopBtn.addEventListener('click', closeShop);
        window.addEventListener('click', (e) => {
            if (e.target === shopModal) closeShop();
        });
        // добавим сохранение перед закрытием вкладки
        window.addEventListener('beforeunload', () => saveGame());
        // дополнительно проверяем тему (адаптивная работает через медиа css)
    }

    init();
</script>
</body>
</html>
